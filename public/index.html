<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUKO XMD — Web Pairing</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f1115; color:#eee;
         display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .card { background:#181b21; padding:2rem 2.5rem; border-radius:12px; width:100%; max-width:380px;
           box-shadow:0 4px 20px rgba(0,0,0,0.4); }
  h1 { font-size:1.3rem; margin-bottom:0.25rem; }
  p.sub { color:#888; font-size:0.85rem; margin-top:0; margin-bottom:1.5rem; }
  input { width:100%; padding:0.75rem; border-radius:8px; border:1px solid #333; background:#0f1115;
          color:#eee; box-sizing:border-box; font-size:1rem; }
  button { width:100%; margin-top:1rem; padding:0.75rem; border:none; border-radius:8px;
           background:#22c55e; color:#08130b; font-weight:600; font-size:1rem; cursor:pointer; }
  button:disabled { opacity:0.6; cursor:not-allowed; }
  #result { margin-top:1.25rem; text-align:center; }
  .code { font-size:1.6rem; letter-spacing:2px; font-weight:700; color:#22c55e; margin-top:0.5rem; }
  .error { color:#f87171; font-size:0.9rem; margin-top:0.75rem; }
  .hint { color:#666; font-size:0.75rem; margin-top:1rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>⚡ ZUKO XMD Web Pairing</h1>
    <p class="sub">Enter your WhatsApp number with country code (no + or spaces), e.g. 2349126933756</p>
    <input id="number" type="text" placeholder="2349126933756" inputmode="numeric" />
    <button id="submit">Get Pairing Code</button>
    <div id="result"></div>
    <div class="hint">Open WhatsApp → Linked Devices → Link with phone number, then enter the code shown here.</div>
  </div>

<script>
const btn = document.getElementById('submit');
const result = document.getElementById('result');
const input = document.getElementById('number');

btn.addEventListener('click', async () => {
  const number = input.value.replace(/[^0-9]/g, '');
  if (!number) {
    result.innerHTML = '<div class="error">Please enter a valid phone number.</div>';
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Requesting...';
  result.innerHTML = '';

  try {
    const res = await fetch('/api/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ number })
    });
    const data = await res.json();

    if (data.code) {
      result.innerHTML = '<div>Your pairing code:</div><div class="code">' + data.code + '</div>';
    } else {
      result.innerHTML = '<div class="error">' + (data.error || 'Failed to get pairing code.') + '</div>';
    }
  } catch (err) {
    result.innerHTML = '<div class="error">Network error. Please try again.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Pairing Code';
  }
});
</script>
</body>
</html>
